name: Azure Machine Learning Training

# This section defines the TRIGGERS (When should the robot wake up?)
on:
  push:
    branches: [ main ]  # Trigger whenever I push to the main branch
  workflow_dispatch:     # Allows you to click a "Run" button manually for testing

jobs:
  # 'train' is just a name for this specific job
  train:
    runs-on: ubuntu-latest # The type of virtual machine the robot uses
    
    steps:
    # Step 1: Clone your code onto the virtual machine
    - name: Check out repository
      uses: actions/checkout@v3

    # Step 2: Log into Azure using the secret you just saved
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Step 3: Install the Azure ML CLI (The 'az ml' commands)
    - name: Install ML Extension
      run: az extension add -n ml -y

    # Step 4: Submit the actual job to Azure ML
    - name: Run ML Job
      run: |
        az ml job create --file src/job.yaml --resource-group ai300-rg --workspace-name ai300-ci
